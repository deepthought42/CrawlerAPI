name: Test

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    # This job runs on PR creation and updates
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download core JAR
        run: bash scripts/download-core.sh

      - name: Test with Maven
        run: mvn test

  build:
    needs: test
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.head_ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Docker-safe image tag
        run: |
          SAFE_TAG=$(echo "${BRANCH_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's|[^a-z0-9_.-]|-|g' \
            | sed 's|^[.-]*||; s|[.-]*$||' \
            | cut -c1-128)

          if [ -z "$SAFE_TAG" ]; then
            SAFE_TAG="pr-${{ github.event.pull_request.number }}"
          fi

          echo "IMAGE_TAG=$SAFE_TAG" >> "$GITHUB_ENV"
          echo "Using Docker tag: $SAFE_TAG"
        
      - name: Build Docker image
        run: |
          docker build -t deepthought42/looksee-api:${{ env.IMAGE_TAG }} .
          docker tag deepthought42/looksee-api:${{ env.IMAGE_TAG }} deepthought42/looksee-api:latest
